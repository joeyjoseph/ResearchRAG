# config.ini — Research Corpus Configuration
# Edit the paths section to match your system before first run. Or save time by doing it automatically using PathUpdate.py
# All other defaults are recommended starting points.

[paths]
# Root folder of your research corpus
CORPUS_ROOT     = /Users/YourUserName/ProjectRoot/Corpus

# Root folder for author's own writing (drafts, memos, notes, finished chapters)
WORK_ROOT       = /Users/YourUserName/ProjectRoot/Work

# Top-level project folder — where PROJECT_CONTEXT.md lives
PROJECT_ROOT    = /Users/YourUserName/ProjectRoot

# Folder where the index files live (created automatically if absent)
DB_PATH         = /Users/YourUserName/ProjectRoot/Index/corpus.db
CHROMA_PATH     = /Users/YourUserName/ProjectRoot/Index/chroma
LOG_PATH        = /Users/YourUserName/ProjectRoot/Index/ingest.log

STATE_DB_PATH = /Users/YourUserName/.hermes/state.db

[chunking]
# Target words per chunk
CHUNK_SIZE      = 400

# Words of overlap between consecutive chunks
CHUNK_OVERLAP   = 50

# Files below this word count are recorded in SQLite but not embedded
MIN_WORDS_SKIP  = 50

# Files below this word count are embedded as a single chunk (no splitting)
MIN_WORDS_SINGLE_CHUNK = 200

[embedding]
# Local sentence-transformers model — downloaded automatically on first run (~90MB)
EMBEDDING_MODEL = all-MiniLM-L6-v2

[chromadb]
# Name of the single ChromaDB collection for the entire corpus
COLLECTION_NAME = research_corpus

# Top-level category folders directly under Corpus/. The key is the exact
# folder name (case-sensitive — must match what's on disk exactly) and the
# value is a one-line description used to help the autoadd.py classifier
# sort new documents correctly. Leave the value blank for a new category
# until you've had a chance to write a real description — classification
# will fall back to using the name alone, with reduced accuracy.
#
# Add a new category by creating the folder under Corpus/ and running:
#     python3 Scripts/PathUpdate.py --project-root <...> --add-to-corpus <...>
# This adds a blank entry here automatically — come back and fill in the
# description afterward.
[corpus_categories]
Books = full-length books or book-length manuscripts.
Articles Journals Websites = journal articles, magazine or newspaper articles, blog posts, or website content.
Interviews = oral histories, interview transcripts, or Q&A-format documents, including anything that identifies itself as an oral history or interview even with biographical or narrative framing around the Q&A content.
Misc = anything else, or anything that cannot be confidently classified (reports, miscellaneous notes, unclear fragments, etc.).

# Top-level category folders directly under Work/. Same key=value structure
# as [corpus_categories] for consistency, but descriptions are not currently
# used anywhere (Work/ files are never auto-classified by autoadd.py) — left
# blank, available if a future feature needs them.
[work_categories]
Proposal =
Drafts =
Manuscript =
Research Memos =
Notes =

[autoadd]
# Below this word count, treat extraction as failed and leave the original in place
ADD_TO_CORPUS_ROOT = /Users/YourUserName/Library/Mobile Documents/com~apple~CloudDocs/Add To Corpus
MIN_WORDS_EXTRACTED = 50

[summarize]
# LLM backend for Corpus/source documents: anthropic | hermes | lmstudio
LLM_BACKEND     = anthropic

# Local backend for Work/author documents — keeps unpublished writing off the API
LOCAL_BACKEND   = lmstudio

# Model to use for Anthropic backend — override at runtime with --model flag
LLM_MODEL       = claude-sonnet-4-6

# Anthropic API key — or set via ANTHROPIC_API_KEY environment variable (preferred)
ANTHROPIC_API_KEY =YOUR_API_KEY

# LM Studio base URL — default port is 1234
LMSTUDIO_BASE_URL = http://localhost:1234/v1

# Max documents to process per run — controls cost and time per session
BATCH_SIZE      = 50

# Seconds to wait between API calls — reduces rate limit pressure
# 3 seconds is conservative and reliable for Tier 1 accounts
DELAY_BETWEEN_REQUESTS = 3

# Max retries on rate limit or server errors before giving up on a document
MAX_RETRIES     = 5

# Your book's research themes — comma separated
# The summarizer will tag each document's relevance to these themes
# Example: chaos theory, complexity science, Cold War, systems thinking, emergence
RESEARCH_THEMES =
